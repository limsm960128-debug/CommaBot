name: 뉴스레터 자동화 파이프라인

on:
  # ──────────────────────────────────────────────
  # KST 07:00 = UTC 22:00 (전날)
  # cron 표현식: 분 시 일 월 요일
  # 월~금(1-5) UTC 22:00 → 한국 시간 다음날 07:00
  # ──────────────────────────────────────────────
  schedule:
    - cron: "0 22 * * 0-4"   # UTC 기준 일~목 22시 = KST 월~금 07시

  # 수동 실행 버튼 (GitHub Actions UI에서 즉시 테스트 가능)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10          # 10분 초과 시 자동 중단 (무한 루프 방지)

    steps:
      # 1. 레포지토리 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Python 환경 설정
      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"           # pip 캐시로 설치 속도 향상

      # 3. 의존성 패키지 설치
      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 4. 메인 스크립트 실행
      #    GitHub Secrets에서 환경 변수를 주입합니다.
      - name: 뉴스레터 파이프라인 실행
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NOTION_TOKEN:        ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:        ${{ secrets.NOTION_DB_ID }}
        run: python main.py
